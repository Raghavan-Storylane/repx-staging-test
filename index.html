<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Button Playground</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    background:#f4f6f9;
    padding:40px;
}

.container{
    max-width:1200px;
    margin:auto;
}

h1{
    margin-bottom:10px;
}

p{
    color:#666;
    margin-bottom:30px;
}

.section{
    background:white;
    padding:25px;
    border-radius:12px;
    box-shadow:0 8px 20px rgba(0,0,0,.08);
    margin-bottom:30px;
}

.button-grid{
    display:flex;
    flex-wrap:wrap;
    gap:15px;
}

button{
    cursor:pointer;
    transition:.25s;
    font-size:15px;
}

button:hover{
    transform:translateY(-3px);
}

.primary{
    background:#2563eb;
    color:white;
    border:none;
    padding:12px 24px;
    border-radius:8px;
}

.secondary{
    background:#6b7280;
    color:white;
    border:none;
    padding:12px 24px;
    border-radius:8px;
}

.success{
    background:#16a34a;
    color:white;
    border:none;
    padding:12px 24px;
    border-radius:8px;
}

.danger{
    background:#dc2626;
    color:white;
    border:none;
    padding:12px 24px;
    border-radius:8px;
}

.warning{
    background:#f59e0b;
    color:white;
    border:none;
    padding:12px 24px;
    border-radius:8px;
}

.dark{
    background:#111827;
    color:white;
    border:none;
    padding:12px 24px;
    border-radius:8px;
}

.outline{
    background:white;
    color:#2563eb;
    border:2px solid #2563eb;
    padding:10px 22px;
    border-radius:8px;
}

.round{
    background:#7c3aed;
    color:white;
    border:none;
    padding:12px 30px;
    border-radius:50px;
}

.small{
    background:#0ea5e9;
    color:white;
    border:none;
    padding:8px 14px;
    border-radius:6px;
    font-size:13px;
}

.large{
    background:#0891b2;
    color:white;
    border:none;
    padding:18px 40px;
    border-radius:10px;
    font-size:18px;
}

.icon{
    background:#ec4899;
    color:white;
    border:none;
    padding:12px 20px;
    border-radius:8px;
}

.ghost{
    background:transparent;
    border:none;
    color:#2563eb;
    font-weight:bold;
}

.disabled{
    background:#d1d5db;
    color:#888;
    border:none;
    padding:12px 24px;
    border-radius:8px;
    cursor:not-allowed;
}

.card-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:20px;
    margin-top:25px;
}

.card{
    background:#fff;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 5px 15px rgba(0,0,0,.1);
}

.card img{
    width:100%;
    height:180px;
    object-fit:cover;
}

.card-content{
    padding:20px;
}

.card-content h3{
    margin-bottom:10px;
}

.card-content p{
    margin-bottom:18px;
}

.card-content button{
    width:100%;
}

.toolbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:30px;
}

.search{
    display:flex;
    gap:10px;
}

input{
    padding:10px 14px;
    border-radius:8px;
    border:1px solid #ccc;
    width:250px;
}
</style>

</head>
<body>

<div class="container">

<div class="toolbar">
    <h1>Button Playground</h1>

    <div class="search">
        <input placeholder="Search..." />
        <button class="primary">Search</button>
    </div>
</div>

<div class="section">

<h2 style="margin-bottom:20px;">Standard Buttons</h2>

<div class="button-grid">

<button class="primary">Primary</button>
<button class="secondary">Secondary</button>
<button class="success">Success</button>
<button class="danger">Delete</button>
<button class="warning">Warning</button>
<button class="dark">Dark</button>
<button class="outline">Outline</button>
<button class="round">Rounded</button>
<button class="small">Small</button>
<button class="large">Large</button>
<button class="icon">⭐ Favorite</button>
<button class="ghost">Ghost Button</button>
<button class="disabled" disabled>Disabled</button>

</div>

</div>

<div class="section">

<h2 style="margin-bottom:20px;">Action Buttons</h2>

<div class="button-grid">

<button class="primary">Create</button>
<button class="success">Save</button>
<button class="secondary">Edit</button>
<button class="danger">Remove</button>
<button class="warning">Archive</button>
<button class="outline">Duplicate</button>
<button class="dark">Download</button>
<button class="icon">📤 Share</button>
<button class="round">Continue</button>
<button class="primary">Checkout</button>

</div>

</div>

<div class="card-grid">

<div class="card">
<img src="https://picsum.photos/400/200?1">
<div class="card-content">
<h3>Product One</h3>
<p>Lorem ipsum dolor sit amet consectetur adipisicing elit.</p>
<button class="primary">Buy Now</button>
</div>
</div>

<div class="card">
<img src="https://picsum.photos/400/200?2">
<div class="card-content">
<h3>Product Two</h3>
<p>Lorem ipsum dolor sit amet consectetur adipisicing elit.</p>
<button class="success" onclick="addToCart()">Add to Cart</button>
<p id="cartMessage" style="margin-top:15px;color:green;font-weight:bold;"></p>

<script>
function addToCart() {
    document.getElementById("cartMessage").textContent =
        "✅ Product added to cart successfully!";
        }
</script>
</div>
</div>

<div class="card">
<img src="https://picsum.photos/400/200?3">
<div class="card-content">
<h3>Product Three</h3>
<p>Lorem ipsum dolor sit amet consectetur adipisicing elit.</p>
<button class="danger">Delete Item</button>
</div>
</div>

</div>

<div class="section">

<h2 style="margin-bottom:20px;">More Buttons</h2>

<div class="button-grid">

<button class="primary">Login</button>
<button class="secondary">Register</button>
<button class="success">Approve</button>
<button class="danger">Reject</button>
<button class="warning">Retry</button>
<button class="dark">Settings</button>
<button class="outline">Profile</button>
<button class="round">Subscribe</button>
<button class="icon">❤️ Like</button>
<button class="icon">📩 Message</button>
<button class="icon">🔔 Notify</button>
<button class="primary">Next</button>
<button class="secondary">Previous</button>
<button class="success">Upload</button>
<button class="danger">Logout</button>

</div>

</div>

</div>
<script async src="https://js.storylane.io/js/staging/repx.js" data-id="sowokjwxyxex"></script>
</body>
</html>
</script>

</body>
</html>
