<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Character Encoding -->
    <meta charset="UTF-8">

    <!-- Mobile Responsive -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Browser Compatibility -->
    <meta http-equiv="X-UA-Compatible" content="IE=edge">

    <!-- SEO -->
    <title>My Website</title>
    <meta name="description" content="Website description goes here.">
    <meta name="keywords" content="keyword1, keyword2">
    <meta name="author" content="Your Name">

    <!-- Theme Color (Mobile Browser Address Bar) -->
    <meta name="theme-color" content="#ffffff">

    <!-- Favicon -->
    <link rel="icon" href="favicon.ico">

    <!-- Optional: Apple Touch Icon -->
    <link rel="apple-touch-icon" href="apple-touch-icon.png">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            line-height: 1.6;
            color: #333;
            background: #f5f5f5;
        }

        .container {
            width: min(90%, 1200px);
            margin: 0 auto;
            padding: 20px;
        }

        header {
            background: #0077ff;
            color: white;
            padding: 20px;
            text-align: center;
        }

        main {
            padding: 30px 0;
        }

        .card {
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,.1);
        }

        footer {
            text-align: center;
            padding: 20px;
            color: #666;
        }

        img {
            max-width: 100%;
            height: auto;
        }

        @media (max-width: 768px) {
            header {
                padding: 15px;
            }

            .container {
                width: 95%;
            }

            .card {
                padding: 16px;
            }
        }
    </style>
</head>

<body>

<header>
    <h1>My Website</h1>
</header>

<main class="container">
    <div class="card">
        <h2>Welcome</h2>
        <p>
            This is a mobile-friendly HTML5 starter template.
            Resize your browser to see the responsive layout.
        </p>
    </div>
</main>

<footer>
    &copy; 2026 My Website
</footer>

<script>
    // JavaScript goes here
    console.log("Page loaded");
</script>
<script async src="https://js.storylane.io/js/test/repx.js" data-id="bgweus86i2fq"></script>
</body>
</html>
